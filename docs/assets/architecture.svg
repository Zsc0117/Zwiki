<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 720" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="13">
  <defs>
    <linearGradient id="gBlue" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#e8f4fd"/><stop offset="100%" stop-color="#d0e8f9"/></linearGradient>
    <linearGradient id="gGreen" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#e6f7e9"/><stop offset="100%" stop-color="#c8eecf"/></linearGradient>
    <linearGradient id="gPurple" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#f3e8fd"/><stop offset="100%" stop-color="#e0cffa"/></linearGradient>
    <linearGradient id="gOrange" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#fff3e0"/><stop offset="100%" stop-color="#ffe0b2"/></linearGradient>
    <linearGradient id="gGray" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#f5f5f5"/><stop offset="100%" stop-color="#e0e0e0"/></linearGradient>
    <linearGradient id="gTeal" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#e0f7fa"/><stop offset="100%" stop-color="#b2ebf2"/></linearGradient>
    <filter id="shadow"><feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.10"/></filter>
    <marker id="arrow" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse"><polygon points="0 0,10 3.5,0 7" fill="#666"/></marker>
    <marker id="arrowBlue" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse"><polygon points="0 0,10 3.5,0 7" fill="#1976d2"/></marker>
  </defs>

  <!-- Title -->
  <text x="480" y="32" text-anchor="middle" font-size="20" font-weight="bold" fill="#333">ZwikiAI System Architecture</text>

  <!-- ===== Client Layer ===== -->
  <rect x="20" y="52" width="920" height="72" rx="12" fill="url(#gBlue)" stroke="#90caf9" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="40" y="72" font-size="11" fill="#1565c0" font-weight="bold">CLIENT LAYER</text>

  <rect x="40" y="82" width="160" height="32" rx="6" fill="#fff" stroke="#64b5f6" stroke-width="1"/>
  <text x="120" y="103" text-anchor="middle" font-size="12" fill="#1565c0">React 18 Frontend</text>
  <text x="120" y="115" text-anchor="middle" font-size="9" fill="#666">:3000</text>

  <rect x="220" y="82" width="160" height="32" rx="6" fill="#fff" stroke="#64b5f6" stroke-width="1"/>
  <text x="300" y="103" text-anchor="middle" font-size="12" fill="#1565c0">Cursor / Windsurf</text>
  <text x="300" y="115" text-anchor="middle" font-size="9" fill="#666">MCP Client</text>

  <rect x="400" y="82" width="160" height="32" rx="6" fill="#fff" stroke="#64b5f6" stroke-width="1"/>
  <text x="480" y="103" text-anchor="middle" font-size="12" fill="#1565c0">GitHub Webhook</text>
  <text x="480" y="115" text-anchor="middle" font-size="9" fill="#666">PR / Push Events</text>

  <rect x="580" y="82" width="160" height="32" rx="6" fill="#fff" stroke="#64b5f6" stroke-width="1"/>
  <text x="660" y="103" text-anchor="middle" font-size="12" fill="#1565c0">WebSocket</text>
  <text x="660" y="115" text-anchor="middle" font-size="9" fill="#666">Notifications</text>

  <!-- Arrows from clients -->
  <line x1="120" y1="114" x2="120" y2="148" stroke="#666" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="480" y1="114" x2="480" y2="148" stroke="#666" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="660" y1="114" x2="540" y2="148" stroke="#666" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ===== Gateway ===== -->
  <rect x="60" y="148" width="560" height="52" rx="10" fill="url(#gOrange)" stroke="#ffb74d" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="80" y="168" font-size="11" fill="#e65100" font-weight="bold">API GATEWAY</text>
  <text x="340" y="172" text-anchor="middle" font-size="14" font-weight="bold" fill="#e65100">zwiki-gateway</text>
  <text x="340" y="190" text-anchor="middle" font-size="11" fill="#bf360c">Spring Cloud Gateway &#183; CORS &#183; Route &#183; :8992</text>

  <!-- MCP Server (separate, not behind gateway) -->
  <rect x="700" y="148" width="220" height="52" rx="10" fill="url(#gTeal)" stroke="#4dd0e1" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="810" y="172" text-anchor="middle" font-size="14" font-weight="bold" fill="#00695c">zwiki-mcp-server</text>
  <text x="810" y="190" text-anchor="middle" font-size="11" fill="#00796b">MCP Protocol (SSE) &#183; :9090</text>
  <line x1="300" y1="98" x2="700" y2="170" stroke="#00897b" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#arrow)"/>

  <!-- Gateway -> Services -->
  <line x1="200" y1="200" x2="160" y2="260" stroke="#666" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="340" y1="200" x2="440" y2="260" stroke="#666" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="480" y1="200" x2="720" y2="260" stroke="#666" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ===== Service Layer ===== -->
  <rect x="20" y="240" width="920" height="200" rx="12" fill="url(#gGreen)" stroke="#a5d6a7" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="40" y="258" font-size="11" fill="#2e7d32" font-weight="bold">SERVICE LAYER</text>

  <!-- zwiki-wiki -->
  <rect x="40" y="268" width="280" height="160" rx="8" fill="#fff" stroke="#66bb6a" stroke-width="1.2"/>
  <text x="180" y="288" text-anchor="middle" font-size="14" font-weight="bold" fill="#2e7d32">zwiki-wiki :8991</text>
  <text x="180" y="304" text-anchor="middle" font-size="10" fill="#555">Core Service</text>
  <line x1="50" y1="312" x2="310" y2="312" stroke="#c8e6c9" stroke-width="0.8"/>
  <text x="56" y="328" font-size="10.5" fill="#444">Wiki Generation (Catalogue + Docs)</text>
  <text x="56" y="344" font-size="10.5" fill="#444">AI Chat (SSE + Tool Calling)</text>
  <text x="56" y="360" font-size="10.5" fill="#444">OAuth2 Login (GitHub / Gitee)</text>
  <text x="56" y="376" font-size="10.5" fill="#444">Task / Repo / Notification Mgmt</text>
  <text x="56" y="392" font-size="10.5" fill="#444">Thesis / Diagram / Code Browser</text>
  <text x="56" y="408" font-size="10.5" fill="#444">MCP Client (external tools)</text>
  <text x="56" y="422" font-size="10.5" fill="#888">23 Controllers &#183; Spring Security</text>

  <!-- zwiki-review -->
  <rect x="340" y="268" width="280" height="100" rx="8" fill="#fff" stroke="#66bb6a" stroke-width="1.2"/>
  <text x="480" y="288" text-anchor="middle" font-size="14" font-weight="bold" fill="#2e7d32">zwiki-review :8990</text>
  <text x="480" y="304" text-anchor="middle" font-size="10" fill="#555">Code Review Service</text>
  <line x1="350" y1="312" x2="610" y2="312" stroke="#c8e6c9" stroke-width="0.8"/>
  <text x="356" y="328" font-size="10.5" fill="#444">GitHub Webhook Receiver</text>
  <text x="356" y="344" font-size="10.5" fill="#444">AI PR Review + Scoring</text>
  <text x="356" y="360" font-size="10.5" fill="#444">Review Result Write-back</text>

  <!-- zwiki-memory -->
  <rect x="640" y="268" width="280" height="100" rx="8" fill="#fff" stroke="#66bb6a" stroke-width="1.2"/>
  <text x="780" y="288" text-anchor="middle" font-size="14" font-weight="bold" fill="#2e7d32">zwiki-memory :8993</text>
  <text x="780" y="304" text-anchor="middle" font-size="10" fill="#555">Memory / RAG Service</text>
  <line x1="650" y1="312" x2="910" y2="312" stroke="#c8e6c9" stroke-width="0.8"/>
  <text x="656" y="328" font-size="10.5" fill="#444">Mem0 Vector Index / Search</text>
  <text x="656" y="344" font-size="10.5" fill="#444">Document &amp; Code Memory</text>
  <text x="656" y="360" font-size="10.5" fill="#444">RAG Context Provider</text>

  <!-- Feign arrows -->
  <path d="M320,340 L340,340" stroke="#1976d2" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrowBlue)"/>
  <path d="M320,380 C380,380 600,380 640,340" stroke="#1976d2" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrowBlue)"/>
  <text x="490" y="392" text-anchor="middle" font-size="9" fill="#1976d2">Feign (zwiki-remote)</text>

  <!-- MCP Server -> DB arrow -->
  <line x1="810" y1="200" x2="810" y2="520" stroke="#00897b" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#arrow)"/>

  <!-- ===== Shared Module Layer ===== -->
  <rect x="20" y="455" width="920" height="58" rx="12" fill="url(#gPurple)" stroke="#ce93d8" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="40" y="473" font-size="11" fill="#6a1b9a" font-weight="bold">SHARED MODULES (non-deployable)</text>

  <rect x="40" y="480" width="130" height="26" rx="5" fill="#fff" stroke="#ba68c8" stroke-width="1"/>
  <text x="105" y="497" text-anchor="middle" font-size="11" fill="#7b1fa2">zwiki-llm</text>

  <rect x="185" y="480" width="130" height="26" rx="5" fill="#fff" stroke="#ba68c8" stroke-width="1"/>
  <text x="250" y="497" text-anchor="middle" font-size="11" fill="#7b1fa2">zwiki-mcp</text>

  <rect x="330" y="480" width="130" height="26" rx="5" fill="#fff" stroke="#ba68c8" stroke-width="1"/>
  <text x="395" y="497" text-anchor="middle" font-size="11" fill="#7b1fa2">zwiki-common</text>

  <rect x="475" y="480" width="130" height="26" rx="5" fill="#fff" stroke="#ba68c8" stroke-width="1"/>
  <text x="540" y="497" text-anchor="middle" font-size="11" fill="#7b1fa2">zwiki-domain</text>

  <rect x="620" y="480" width="130" height="26" rx="5" fill="#fff" stroke="#ba68c8" stroke-width="1"/>
  <text x="685" y="497" text-anchor="middle" font-size="11" fill="#7b1fa2">zwiki-remote</text>

  <!-- ===== Infrastructure Layer ===== -->
  <rect x="20" y="528" width="920" height="60" rx="12" fill="url(#gGray)" stroke="#bdbdbd" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="40" y="548" font-size="11" fill="#424242" font-weight="bold">INFRASTRUCTURE</text>

  <rect x="60" y="555" width="120" height="26" rx="5" fill="#fff" stroke="#9e9e9e" stroke-width="1"/>
  <text x="120" y="573" text-anchor="middle" font-size="12" fill="#333">MySQL 8.0</text>

  <rect x="200" y="555" width="120" height="26" rx="5" fill="#fff" stroke="#9e9e9e" stroke-width="1"/>
  <text x="260" y="573" text-anchor="middle" font-size="12" fill="#333">Redis</text>

  <rect x="340" y="555" width="120" height="26" rx="5" fill="#fff" stroke="#9e9e9e" stroke-width="1"/>
  <text x="400" y="573" text-anchor="middle" font-size="12" fill="#333">Nacos</text>

  <rect x="480" y="555" width="120" height="26" rx="5" fill="#fff" stroke="#9e9e9e" stroke-width="1"/>
  <text x="540" y="573" text-anchor="middle" font-size="12" fill="#333">MinIO</text>

  <!-- Arrows from services to infra -->
  <line x1="180" y1="428" x2="180" y2="528" stroke="#888" stroke-width="0.8" stroke-dasharray="3,3"/>
  <line x1="480" y1="368" x2="260" y2="555" stroke="#888" stroke-width="0.8" stroke-dasharray="3,3"/>
  <line x1="780" y1="368" x2="260" y2="555" stroke="#888" stroke-width="0.8" stroke-dasharray="3,3"/>

  <!-- ===== External LLM Providers ===== -->
  <rect x="20" y="608" width="920" height="100" rx="12" fill="#fff" stroke="#e0e0e0" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="40" y="628" font-size="11" fill="#f57c00" font-weight="bold">EXTERNAL LLM PROVIDERS (via zwiki-llm load balancing)</text>

  <rect x="40" y="638" width="110" height="28" rx="14" fill="#fff3e0" stroke="#ffb74d" stroke-width="1"/>
  <text x="95" y="657" text-anchor="middle" font-size="11" fill="#e65100">DashScope</text>

  <rect x="165" y="638" width="100" height="28" rx="14" fill="#fff3e0" stroke="#ffb74d" stroke-width="1"/>
  <text x="215" y="657" text-anchor="middle" font-size="11" fill="#e65100">OpenAI</text>

  <rect x="280" y="638" width="100" height="28" rx="14" fill="#fff3e0" stroke="#ffb74d" stroke-width="1"/>
  <text x="330" y="657" text-anchor="middle" font-size="11" fill="#e65100">DeepSeek</text>

  <rect x="395" y="638" width="100" height="28" rx="14" fill="#fff3e0" stroke="#ffb74d" stroke-width="1"/>
  <text x="445" y="657" text-anchor="middle" font-size="11" fill="#e65100">Moonshot</text>

  <rect x="510" y="638" width="100" height="28" rx="14" fill="#fff3e0" stroke="#ffb74d" stroke-width="1"/>
  <text x="560" y="657" text-anchor="middle" font-size="11" fill="#e65100">Azure</text>

  <rect x="625" y="638" width="100" height="28" rx="14" fill="#fff3e0" stroke="#ffb74d" stroke-width="1"/>
  <text x="675" y="657" text-anchor="middle" font-size="11" fill="#e65100">MiniMax</text>

  <rect x="740" y="638" width="100" height="28" rx="14" fill="#fff3e0" stroke="#ffb74d" stroke-width="1"/>
  <text x="790" y="657" text-anchor="middle" font-size="11" fill="#e65100">Zhipu</text>

  <rect x="855" y="638" width="80" height="28" rx="14" fill="#fff3e0" stroke="#ffb74d" stroke-width="1"/>
  <text x="895" y="657" text-anchor="middle" font-size="11" fill="#e65100">Custom</text>

  <text x="480" y="690" text-anchor="middle" font-size="10" fill="#888">Round-Robin + Auto Circuit Breaker + Health Check + Retry + Per-Scene Model Selection</text>

  <!-- Arrow from shared module to LLM -->
  <line x1="105" y1="506" x2="105" y2="608" stroke="#f57c00" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
</svg>
