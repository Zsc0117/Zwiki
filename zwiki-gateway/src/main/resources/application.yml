server:
  port: 8992

spring:
  application:
    name: zwiki-gateway
  profiles:
    active: dev
  config:
    import:
      - optional:nacos:zwiki-gateway-service-dev.yaml?refresh=true
  cloud:
    discovery:
      enabled: ${NACOS_ENABLED:false}
    service-registry:
      auto-registration:
        enabled: ${NACOS_ENABLED:false}
    nacos:
      config:
        enabled: ${NACOS_ENABLED:false}
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
        namespace: ${NACOS_NAMESPACE:public}
        file-extension: yaml
        group: DEFAULT_GROUP
        refresh-enabled: true
        username: ${NACOS_USERNAME:}
        password: ${NACOS_PASSWORD:}
      discovery:
        enabled: ${NACOS_ENABLED:false}
        register-enabled: ${NACOS_ENABLED:false}
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
        namespace: ${NACOS_NAMESPACE:public}
        username: ${NACOS_USERNAME:}
        password: ${NACOS_PASSWORD:}
    gateway:
      httpclient:
        response-timeout: 600s
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_LAST
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000}
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
      routes:
        - id: zwiki-wiki-ws
          uri: ${WIKI_WS_URI:ws://localhost:8991}
          predicates:
            - Path=/ws/notification/**
          filters:
            - StripPrefix=0

        # Wiki服务路由
        - id: zwiki-wiki
          uri: ${WIKI_SERVICE_URI:http://localhost:8991}
          predicates:
            - Path=/api/task/**,/api/wiki/**,/api/chat/**,/api/thesis/**,/api/mcp/**,/api/auth/**,/api/notification/**,/api/stats/**,/api/llm/**,/api/review/**,/api/search/**,/api/media/**,/api/diagram/**,/oauth2/**,/login/oauth2/**
          filters:
            - StripPrefix=0

        # Wiki服务路由 - Wiki Webhook (push自动更新)
        - id: zwiki-wiki-webhook
          uri: ${WIKI_SERVICE_URI:http://localhost:8991}
          predicates:
            - Path=/api/webhook/wiki/**
          filters:
            - StripPrefix=0

        # Review服务路由 - Webhook
        - id: zwiki-review-webhook
          uri: ${REVIEW_SERVICE_URI:http://localhost:8990}
          predicates:
            - Path=/api/webhook/**
          filters:
            - StripPrefix=0

        # Review服务路由 - 其他
        - id: zwiki-review
          uri: ${REVIEW_SERVICE_URI:http://localhost:8990}
          predicates:
            - Path=/api/v1/github/**,/api/review/**
          filters:
            - StripPrefix=0

        # Memory服务路由 - 核心记忆管理
        - id: zwiki-memory
          uri: ${MEMORY_SERVICE_URI:http://localhost:8993}
          predicates:
            - Path=/api/memory/**
          filters:
            - StripPrefix=0

        # Memory服务路由 - 搜索功能
        - id: zwiki-memory-search
          uri: ${MEMORY_SERVICE_URI:http://localhost:8993}
          predicates:
            - Path=/api/search/**
          filters:
            - StripPrefix=0

        # Memory服务路由 - 健康检查
        - id: zwiki-memory-health
          uri: ${MEMORY_SERVICE_URI:http://localhost:8993}
          predicates:
            - Path=/api/health/**
          filters:
            - StripPrefix=0

        # Memory服务路由 - 功能监控
        - id: zwiki-memory-monitor
          uri: ${MEMORY_SERVICE_URI:http://localhost:8993}
          predicates:
            - Path=/api/function-monitor/**
          filters:
            - StripPrefix=0
      
