#---------------------------------数据库配置----------------------------------#
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/zwiki?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:}

  #---------------------------------Redis配置----------------------------------#
  data:
    redis:
      host: ${ZWIKI_REDIS_HOST:127.0.0.1}
      port: ${ZWIKI_REDIS_PORT:6379}
      database: ${ZWIKI_REDIS_DATABASE:6}
      password: ${ZWIKI_REDIS_PASSWORD:}
      timeout: 10s
      connect-timeout: 5s
      lettuce:
        pool:
          max-active: 200
          max-wait: 5s
          max-idle: 50
          min-idle: 10
          time-between-eviction-runs: 30s
        shutdown-timeout: 200ms

  #---------------------------------Spring AI配置----------------------------------#
  ai:
    memory:
      redis:
        host: ${spring.data.redis.host}
        port: ${spring.data.redis.port}
        database: ${spring.data.redis.database}
        password: ${spring.data.redis.password}
        timeout: 5000
    openai:
      api-key: ${DASHSCOPE_API_KEY:}
      base-url: https://dashscope.aliyuncs.com/compatible-mode
      chat:
        options:
          model:
          stream-usage: true

#---------------------------------Mem0配置----------------------------------#
mem0:
  client:
    base-url: https://api.mem0.ai/v1
    api-key: ${MEM0_API_KEY:}
    max-retry-attempts: 1
  server:
    version: v1.1
    vector-store:
      provider: pgvector
      config:
        host: ${POSTGRES_HOST:postgres}
        port: ${POSTGRES_PORT:5432}
        dbname: ${POSTGRES_DB:postgres}
        user: ${POSTGRES_USER:postgres}
        password: ${POSTGRES_PASSWORD:}
        collection-name: ${POSTGRES_COLLECTION_NAME:memories}
    graph-store:
      provider: neo4j
      config:
        url: ${NEO4J_URI:bolt://neo4j:7687}
        username: ${NEO4J_USERNAME:neo4j}
        password: ${NEO4J_PASSWORD:}
    llm:
      provider: openai
      config:
        api-key: ${DASHSCOPE_API_KEY:}
        temperature: 0.2
        model: kimi-k2-thinking
        openai-base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
    embedder:
      provider: openai
      config:
        api-key: ${DASHSCOPE_API_KEY:}
        model: text-embedding-v4
        openai-base-url: https://dashscope.aliyuncs.com/compatible-mode/v1

#---------------------------------项目配置----------------------------------#
project:
  memory:
    redis:
      topics:
        mem-index: "memory-index-topic"
        mem-retry: "memory-index-retry-topic"
        mem-dlq: "memory-index-dlq"
      consumer:
        max-concurrency: 2
        process-interval: 1000
        max-retry: 3
        retry-delay: 30000

#---------------------------------日志配置----------------------------------#
logging:
  level:
    com.zwiki.memory: INFO
    org.springframework.ai: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: ./logs/zwiki-memory.log
