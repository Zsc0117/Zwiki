#---------------------------------数据库配置----------------------------------#
spring:
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/zwiki?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:}

  #---------------------------------Redis配置----------------------------------#
  data:
    redis:
      host: ${ZWIKI_REDIS_HOST:127.0.0.1}
      port: ${ZWIKI_REDIS_PORT:6379}
      database: ${ZWIKI_REDIS_DATABASE:6}
      password: ${ZWIKI_REDIS_PASSWORD:}
      timeout: 10s
      connect-timeout: 5s
      lettuce:
        pool:
          max-active: 200
          max-wait: 5s
          max-idle: 50
          min-idle: 10
          time-between-eviction-runs: 30s
        shutdown-timeout: 200ms

  #---------------------------------Spring AI配置----------------------------------#
  ai:
    openai:
      api-key: ${DASHSCOPE_API_KEY:}
      base-url: https://dashscope.aliyuncs.com/compatible-mode
      chat:
        options:
          model:
          stream-usage: true

#---------------------------------LLM负载均衡配置 + Token加密配置----------------------------------#
zwiki:
  llm:
    balancer:
      enabled: true
      strategy: round_robin
      max-attempts-per-request: 3
      unhealthy-cooldown-seconds: 300
  auth:
    token-crypto-key: ${ZWIKI_TOKEN_CRYPTO_KEY:}

#---------------------------------应用配置----------------------------------#
app:
  github:
    token: ${GITHUB_TOKEN:}
    webhook:
      secret: ${GITHUB_WEBHOOK_SECRET:}
  knowledge:
    base-path: ${KNOWLEDGE_BASE_PATH:./knowledge-base}
    index-name: ${BAILIAN_INDEX_NAME:code-review-knowledge}
    style-guide:
      documents-path: ${app.knowledge.base-path}/style-guides
    project:
      cache-path: ${app.knowledge.base-path}/projects

#---------------------------------Memory服务配置----------------------------------#
memory:
  service:
    url: ${MEMORY_SERVICE_URL:http://localhost:8993}

#---------------------------------Feign配置----------------------------------#
feign:
  client:
    config:
      memory-service:
        connectTimeout: 5000
        readTimeout: 30000
        loggerLevel: full
  hystrix:
    enabled: false
  circuitbreaker:
    enabled: false

#---------------------------------异步任务配置----------------------------------#
task:
  execution:
    pool:
      core-size: 2
      max-size: 5
      queue-capacity: 100
      keep-alive: 60s

#---------------------------------日志配置----------------------------------#
logging:
  level:
    com.zwiki.review: INFO
    org.springframework.ai: DEBUG
    org.kohsuke.github: WARN
    com.alibaba.cloud.ai: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: ./logs/zwiki-review.log
