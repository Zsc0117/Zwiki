server:
  port: 9090

spring:
  application:
    name: zwiki-mcp-server
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:127.0.0.1}:${MYSQL_PORT:3306}/zwiki?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    open-in-view: false
    database-platform: org.hibernate.dialect.MySQLDialect

# ZwikiAI MCP Server 配置
zwiki:
  mcp-server:
    # API Key 列表（逗号分隔），客户端需通过 Authorization: Bearer <key> 认证
    api-keys: ${ZWIKI_MCP_API_KEYS:}
    # 单个文件最大读取字节数
    max-file-size: 1048576
    # 文件树最大深度
    max-tree-depth: 10
    # 搜索结果最大条数
    max-search-results: 20

logging:
  level:
    com.zwiki.mcpserver: INFO
    org.springframework.ai.mcp: DEBUG
